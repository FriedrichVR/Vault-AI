<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d0df2",
                        "background-light": "#f5f5f8",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .scanline {
            height: 2px;
            background: linear-gradient(90deg, transparent, #0d0df2, transparent);
            box-shadow: 0 0 15px 2px rgba(13, 13, 242, 0.5);
            position: absolute;
            width: 100%;
            top: 40%;
        }
        .viewfinder-corner {
            width: 24px;
            height: 24px;
            border-color: #0d0df2;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/app.js" defer></script>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<div class="z-20 flex items-center bg-transparent p-4 justify-between backdrop-blur-md border-b border-white/5">
<button class="text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-100 text-sm font-semibold tracking-wide uppercase flex-1 text-center">Escaneo de Facturas</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-white/10 transition-colors text-slate-100">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</div>
</div>
<!-- Camera Viewfinder Area -->
<div class="relative flex-1 bg-neutral-900 overflow-hidden flex items-center justify-center">
<!-- Mock Invoice Image Background -->
<div class="absolute inset-0 opacity-40">
<img alt="Documento de factura sobre una mesa de madera oscura" class="w-full h-full object-cover" data-alt="Invoice document on dark wooden table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvzNhIt9_Y8pDqFhsbPkJEhIb5hiQO2dxbM3tibreeTynsTlm5Fnqo45HdjV5QSmljW1Kj5N9h59e2Mrxft4vcLX8ycH6QqzTqVsrLSz-uVcpUr0WkLLRBr9F_7TmYAlHQIQxKDMqbroRFMY7Avt3WspvbPOtiLXv6y9taxHqxmmMjrAI0lXaSsQDVfkYbQpC6XsU-sDIb9UBOPXSjJkNUxIEJC-8kUDNU_qcobNmRVNFmqJqbS0wjr0D1nPVjv0bH8tyYXsW4MPA"/>
</div>
<!-- Viewfinder Frame -->
<div class="relative w-4/5 h-3/5 border border-white/10 rounded-xl overflow-hidden backdrop-blur-[2px]">
<!-- Corners -->
<div class="absolute top-0 left-0 viewfinder-corner border-t-2 border-l-2 rounded-tl-lg"></div>
<div class="absolute top-0 right-0 viewfinder-corner border-t-2 border-r-2 rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 viewfinder-corner border-b-2 border-l-2 rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 viewfinder-corner border-b-2 border-r-2 rounded-br-lg"></div>
<!-- Scanline -->
<div class="scanline"></div>
<!-- Feedback overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-primary/20 border border-primary/40 px-4 py-2 rounded-full backdrop-blur-md">
<p class="text-xs font-medium text-white tracking-wider uppercase">Detectando bordes...</p>
</div>
</div>
</div>
<!-- Instruction Hint -->
<div class="absolute bottom-8 w-full text-center px-6">
<p class="text-slate-300 text-sm font-medium bg-black/40 inline-block px-4 py-2 rounded-full backdrop-blur-sm">
                    Alinee la factura dentro del marco
                </p>
</div>
</div>
<!-- Processing State & Controls -->
<div class="z-20 flex flex-col gap-6 bg-background-dark p-6 pt-8 border-t border-white/5 rounded-t-3xl shadow-2xl">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<div class="flex flex-col gap-1">
<p class="text-slate-100 text-lg font-semibold leading-none">Procesando factura</p>
<p class="text-slate-400 text-xs uppercase tracking-widest font-medium">Extrayendo datos fiscales</p>
</div>
<p class="text-primary text-sm font-bold tabular-nums">72%</p>
</div>
<div class="h-1.5 w-full rounded-full bg-white/5 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 72%;"></div>
</div>
</div>
<div class="flex items-center justify-between px-4 pb-2">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/5 text-slate-100 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary shadow-[0_0_30px_-5px_rgba(13,13,242,0.6)] text-white hover:scale-105 transition-transform">
<span class="material-symbols-outlined !text-4xl">camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/5 text-slate-100 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
</div>
<!-- Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-background-dark/95 backdrop-blur-xl border-t border-border-dark px-6 pb-6 pt-3 z-50">
    <div class="flex justify-between items-center max-w-md mx-auto px-2 relative">
        <a class="flex flex-col items-center gap-1 group" href="index.html">
            <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">home</span>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-primary">Inicio</span>
        </a>
        <a class="flex flex-col items-center gap-1 group" href="movimientos.html">
            <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">receipt_long</span>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-primary">Movimientos</span>
        </a>
        <a class="flex flex-col items-center gap-1 group relative -top-6" href="escaneo.html">
            <div class="w-12 h-12 bg-primary group-hover:bg-primary/90 transition-colors rounded-full flex items-center justify-center shadow-lg shadow-primary/40 border-4 border-background-dark">
                <span class="material-symbols-outlined text-white">add</span>
            </div>
        </a>
        <a class="flex flex-col items-center gap-1 group" href="asistente.html">
            <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">auto_awesome</span>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-primary">Asistente</span>
        </a>
        <a class="flex flex-col items-center gap-1 group" href="#">
            <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">person</span>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-primary">Perfil</span>
        </a>
    </div>
</nav>
</div>
</body></html>
